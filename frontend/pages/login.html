<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Jobify — Login</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root[data-theme="dark"] {
      --bg: #0d0d0f;
      --surface: #161618;
      --surface2: #1e1e21;
      --border: rgba(255,255,255,0.07);
      --text: #f0ede8;
      --text-muted: #888;
      --text-faint: #444;
      --accent: #f5a623;
      --accent2: #ff6b35;
      --success: #3ecf8e;
      --danger: #ff4d4d;
      --shadow: rgba(0,0,0,0.4);
    }
    :root[data-theme="light"] {
      --bg: #f5f5f0;
      --surface: #ffffff;
      --surface2: #f0f0eb;
      --border: rgba(0,0,0,0.08);
      --text: #0d0d0f;
      --text-muted: #666;
      --text-faint: #999;
      --accent: #e8950f;
      --accent2: #ff6b35;
      --success: #2db87a;
      --danger: #e03030;
      --shadow: rgba(0,0,0,0.1);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      transition: background 0.3s, color 0.3s;
    }

    /* NAVBAR */
    .navbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 32px;
      height: 64px;
      border-bottom: 1px solid var(--border);
      background: var(--bg);
    }
    .logo {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 1.4rem;
      color: var(--text);
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .logo-dot { color: var(--accent); }

    /* THEME TOGGLE */
    .theme-toggle {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 100px;
      padding: 6px 14px;
      cursor: pointer;
      font-size: 0.85rem;
      color: var(--text-muted);
      display: flex;
      align-items: center;
      gap: 6px;
      transition: all 0.2s;
    }
    .theme-toggle:hover { color: var(--text); }

    /* MAIN */
    .main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 24px;
      position: relative;
      overflow: hidden;
    }

    .main::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(245,166,35,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(245,166,35,0.04) 1px, transparent 1px);
      background-size: 50px 50px;
      mask-image: radial-gradient(ellipse 60% 60% at 50% 50%, black, transparent);
      pointer-events: none;
    }

    /* CARD */
    .auth-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 40px;
      width: 100%;
      max-width: 460px;
      position: relative;
      box-shadow: 0 24px 60px var(--shadow);
      animation: fadeUp 0.4s ease both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .card-header {
      text-align: center;
      margin-bottom: 32px;
    }
    .card-header h1 {
      font-family: 'Syne', sans-serif;
      font-size: 1.8rem;
      font-weight: 800;
      letter-spacing: -1px;
      margin-bottom: 6px;
    }
    .card-header p {
      color: var(--text-muted);
      font-size: 0.9rem;
    }

    /* TABS */
    .tabs {
      display: flex;
      background: var(--surface2);
      border-radius: 12px;
      padding: 4px;
      margin-bottom: 28px;
    }
    .tab {
      flex: 1;
      padding: 10px;
      text-align: center;
      border-radius: 9px;
      cursor: pointer;
      font-size: 0.9rem;
      font-weight: 500;
      color: var(--text-muted);
      transition: all 0.2s;
      border: none;
      background: transparent;
      font-family: 'DM Sans', sans-serif;
    }
    .tab.active {
      background: var(--surface);
      color: var(--text);
      box-shadow: 0 2px 8px var(--shadow);
    }

    /* ROLE SELECTOR */
    .role-selector {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 20px;
    }
    .role-btn {
      padding: 14px;
      border-radius: 12px;
      border: 1px solid var(--border);
      background: var(--surface2);
      color: var(--text-muted);
      cursor: pointer;
      text-align: center;
      transition: all 0.2s;
      font-family: 'DM Sans', sans-serif;
    }
    .role-btn .role-icon { font-size: 1.5rem; display: block; margin-bottom: 6px; }
    .role-btn .role-label { font-size: 0.85rem; font-weight: 500; }
    .role-btn .role-desc { font-size: 0.72rem; color: var(--text-faint); margin-top: 2px; }
    .role-btn.selected {
      border-color: var(--accent);
      background: rgba(245,166,35,0.08);
      color: var(--text);
    }
    .role-btn.selected .role-label { color: var(--accent); }

    /* FORM */
    .form { display: flex; flex-direction: column; gap: 16px; }
    .form-group { display: flex; flex-direction: column; gap: 6px; }
    .form-group label {
      font-size: 0.82rem;
      font-weight: 500;
      color: var(--text-muted);
    }
    .form-group input {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px 14px;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.9rem;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
      width: 100%;
    }
    .form-group input:focus {
      border-color: rgba(245,166,35,0.5);
      box-shadow: 0 0 0 3px rgba(245,166,35,0.08);
    }
    .form-group input::placeholder { color: var(--text-faint); }

    /* SUBMIT BUTTON */
    .btn-submit {
      width: 100%;
      padding: 13px;
      background: var(--accent);
      color: #0d0d0f;
      border: none;
      border-radius: 10px;
      font-family: 'DM Sans', sans-serif;
      font-weight: 700;
      font-size: 0.95rem;
      cursor: pointer;
      transition: all 0.2s;
      margin-top: 4px;
    }
    .btn-submit:hover {
      background: #fbb83e;
      transform: translateY(-1px);
      box-shadow: 0 8px 20px rgba(245,166,35,0.3);
    }
    .btn-submit:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }

    /* ALERT */
    .alert {
      padding: 12px 14px;
      border-radius: 10px;
      font-size: 0.85rem;
      display: none;
      margin-bottom: 4px;
    }
    .alert.error {
      background: rgba(255,77,77,0.1);
      border: 1px solid rgba(255,77,77,0.2);
      color: var(--danger);
      display: block;
    }
    .alert.success {
      background: rgba(62,207,142,0.1);
      border: 1px solid rgba(62,207,142,0.2);
      color: var(--success);
      display: block;
    }

    /* DIVIDER */
    .divider {
      text-align: center;
      color: var(--text-faint);
      font-size: 0.8rem;
      margin: 4px 0;
      position: relative;
    }
    .divider::before, .divider::after {
      content: '';
      position: absolute;
      top: 50%;
      width: 40%;
      height: 1px;
      background: var(--border);
    }
    .divider::before { left: 0; }
    .divider::after { right: 0; }

    /* FOOTER */
    .footer {
      text-align: center;
      padding: 20px;
      color: var(--text-faint);
      font-size: 0.8rem;
      border-top: 1px solid var(--border);
    }

    @media(max-width: 480px) {
      .auth-card { padding: 28px 20px; }
      .card-header h1 { font-size: 1.5rem; }
    }
  </style>
</head>
<body>

<nav class="navbar">
  <a href="index.html" class="logo">
    <span class="logo-dot">⬡</span> Jobify
  </a>
  <button class="theme-toggle" id="themeToggle">
    <span id="themeIcon">☀️</span>
    <span id="themeText">Light Mode</span>
  </button>
</nav>

<main class="main">
  <div class="auth-card">
    <div class="card-header">
      <h1>Welcome to <span style="color:var(--accent)">Jobify</span></h1>
      <p>Your career journey starts here</p>
    </div>

    <!-- TABS -->
    <div class="tabs">
      <button class="tab active" id="loginTab" onclick="switchTab('login')">Login</button>
      <button class="tab" id="registerTab" onclick="switchTab('register')">Register</button>
    </div>

    <!-- ALERT -->
    <div class="alert" id="alert"></div>

    <!-- LOGIN FORM -->
    <div id="loginForm">
      <form class="form" onsubmit="handleLogin(event)">
        <div class="form-group">
          <label>Email Address</label>
          <input type="email" id="loginEmail" placeholder="you@example.com" required>
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="loginPassword" placeholder="Your password" required>
        </div>
        <button type="submit" class="btn-submit" id="loginBtn">Login →</button>
      </form>
    </div>

    <!-- REGISTER FORM -->
    <div id="registerForm" style="display:none">
      <!-- ROLE SELECTOR -->
      <div class="role-selector" style="margin-bottom:20px">
        <div class="role-btn selected" id="roleStudent" onclick="selectRole('student')">
          <span class="role-icon">🎓</span>
          <div class="role-label">Student</div>
          <div class="role-desc">Find & apply for jobs</div>
        </div>
        <div class="role-btn" id="roleRecruiter" onclick="selectRole('recruiter')">
          <span class="role-icon">🏢</span>
          <div class="role-label">Recruiter</div>
          <div class="role-desc">Post jobs & hire talent</div>
        </div>
      </div>

      <form class="form" onsubmit="handleRegister(event)">
        <div class="form-group">
          <label>Full Name</label>
          <input type="text" id="regName" placeholder="Your full name" required>
        </div>
        <div class="form-group">
          <label>Email Address</label>
          <input type="email" id="regEmail" placeholder="you@example.com" required>
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="regPassword" placeholder="Min 6 characters" required>
        </div>
        <button type="submit" class="btn-submit" id="registerBtn">Create Account →</button>
      </form>
    </div>

  </div>
</main>

<footer class="footer">
  © 2026 Jobify. Built with ambition.
</footer>

<script>
  const API = 'http://localhost:5000/api';
  let selectedRole = 'student';

  // THEME TOGGLE
  const html = document.documentElement;
  const themeToggle = document.getElementById('themeToggle');
  const themeIcon = document.getElementById('themeIcon');
  const themeText = document.getElementById('themeText');

  const savedTheme = localStorage.getItem('theme') || 'dark';
  html.setAttribute('data-theme', savedTheme);
  updateThemeBtn(savedTheme);

  themeToggle.addEventListener('click', () => {
    const current = html.getAttribute('data-theme');
    const next = current === 'dark' ? 'light' : 'dark';
    html.setAttribute('data-theme', next);
    localStorage.setItem('theme', next);
    updateThemeBtn(next);
  });

  function updateThemeBtn(theme) {
    if (theme === 'dark') {
      themeIcon.textContent = '☀️';
      themeText.textContent = 'Light Mode';
    } else {
      themeIcon.textContent = '🌙';
      themeText.textContent = 'Dark Mode';
    }
  }

  // TAB SWITCH
  function switchTab(tab) {
    const loginForm = document.getElementById('loginForm');
    const registerForm = document.getElementById('registerForm');
    const loginTab = document.getElementById('loginTab');
    const registerTab = document.getElementById('registerTab');
    hideAlert();

    if (tab === 'login') {
      loginForm.style.display = 'block';
      registerForm.style.display = 'none';
      loginTab.classList.add('active');
      registerTab.classList.remove('active');
    } else {
      loginForm.style.display = 'none';
      registerForm.style.display = 'block';
      loginTab.classList.remove('active');
      registerTab.classList.add('active');
    }
  }

  // ROLE SELECT
  function selectRole(role) {
    selectedRole = role;
    document.getElementById('roleStudent').classList.toggle('selected', role === 'student');
    document.getElementById('roleRecruiter').classList.toggle('selected', role === 'recruiter');
  }

  // ALERT
  function showAlert(msg, type) {
    const alert = document.getElementById('alert');
    alert.textContent = msg;
    alert.className = 'alert ' + type;
  }
  function hideAlert() {
    document.getElementById('alert').className = 'alert';
  }

  // LOGIN
  async function handleLogin(e) {
    e.preventDefault();
    const btn = document.getElementById('loginBtn');
    btn.disabled = true;
    btn.textContent = 'Logging in...';
    hideAlert();

    const email = document.getElementById('loginEmail').value;
    const password = document.getElementById('loginPassword').value;

    try {
      const res = await fetch(`${API}/auth/login`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password })
      });

      const data = await res.json();

      if (!res.ok) {
        showAlert(data.message || 'Login failed', 'error');
        btn.disabled = false;
        btn.textContent = 'Login →';
        return;
      }

      // Save token and user
      localStorage.setItem('token', data.token);
      localStorage.setItem('user', JSON.stringify(data.user));

      showAlert('Login successful! Redirecting...', 'success');

      // Redirect based on role
      setTimeout(() => {
        if (data.user.role === 'recruiter') {
          window.location.href = 'dashboard.html';
        } else {
          window.location.href = 'index.html';
        }
      }, 800);

    } catch (err) {
      showAlert('Cannot connect to server. Make sure backend is running.', 'error');
      btn.disabled = false;
      btn.textContent = 'Login →';
    }
  }

  // REGISTER
  async function handleRegister(e) {
    e.preventDefault();
    const btn = document.getElementById('registerBtn');
    btn.disabled = true;
    btn.textContent = 'Creating account...';
    hideAlert();

    const name = document.getElementById('regName').value;
    const email = document.getElementById('regEmail').value;
    const password = document.getElementById('regPassword').value;

    if (password.length < 6) {
      showAlert('Password must be at least 6 characters', 'error');
      btn.disabled = false;
      btn.textContent = 'Create Account →';
      return;
    }

    try {
      const res = await fetch(`${API}/auth/register`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name, email, password, role: selectedRole })
      });

      const data = await res.json();

      if (!res.ok) {
        showAlert(data.message || 'Registration failed', 'error');
        btn.disabled = false;
        btn.textContent = 'Create Account →';
        return;
      }

      showAlert('Account created! Please login.', 'success');
      btn.disabled = false;
      btn.textContent = 'Create Account →';

      // Switch to login tab after 1 second
      setTimeout(() => switchTab('login'), 1000);

    } catch (err) {
      showAlert('Cannot connect to server. Make sure backend is running.', 'error');
      btn.disabled = false;
      btn.textContent = 'Create Account →';
    }
  }

  // Check if already logged in
  const existingUser = JSON.parse(localStorage.getItem('user'));
  if (existingUser) {
    if (existingUser.role === 'recruiter') {
      window.location.href = 'dashboard.html';
    } else {
      window.location.href = 'index.html';
    }
  }
</script>
</body>
</html>
